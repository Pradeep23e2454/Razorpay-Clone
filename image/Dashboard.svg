<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

  <!-- Main Document -->
  <g transform="translate(20 15)">
    
    <!-- Paper -->
    <rect x="0" y="0" width="45" height="60" rx="6" fill="white"></rect>

    <!-- Fold -->
    <polygon points="33,0 45,0 45,12" fill="#E6ECF7"></polygon>

    <!-- Text Lines -->
    <rect x="8" y="14" width="28" height="4" rx="2" fill="#D6DEEE"></rect>
    <rect x="8" y="22" width="24" height="4" rx="2" fill="#D6DEEE"></rect>
    <rect x="8" y="30" width="26" height="4" rx="2" fill="#D6DEEE"></rect>

  </g>

  <!-- Small Blue Card -->
  <g transform="translate(55 50)">
    
    <rect x="0" y="0" width="30" height="30" rx="5" fill="#2F6FE4"></rect>
    
    <!-- Lines on Card -->
    <rect x="6" y="8" width="18" height="3" rx="1.5" fill="white"></rect>
    <rect x="6" y="14" width="14" height="3" rx="1.5" fill="white"></rect>
    <rect x="6" y="20" width="10" height="3" rx="1.5" fill="white"></rect>

  </g>

</svg>